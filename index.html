<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Mon premier site</title>
</head>
<body>
  <h1>Bonjour, tout le mondeeeee !</h1>
  <p>Je suis en train d'apprendre à coder.</p>

  <button id="bonjour-btn">Afficher le message</button>
  <p id="bravo-message" style="display: none;">Bravo Hedayat !</p>
  <button id="cacher-btn" style="display: none;">Cacher le message</button>

  <script>
    const bonjourBtn = document.getElementById("bonjour-btn");
    const bravoMessage = document.getElementById("bravo-message");
    const cacherBtn = document.getElementById("cacher-btn");

    bonjourBtn.addEventListener("click", function () {
      bravoMessage.style.display = "block";
      cacherBtn.style.display = "inline-block";
    });

    cacherBtn.addEventListener("click", function () {
      bravoMessage.style.display = "none";
      cacherBtn.style.display = "none";
    });
  </script>
</body>
</html>
